baseURL = "https://axiat.github.io/Emboddied-AI-Studies/"
languageCode = "zh-cn"
defaultContentLanguage = "zh"
hasCJKLanguage = true
title = "Research Blog"
theme = "PaperMod"

[languages]
  [languages.zh]
    languageCode = "zh-cn"
    languageName = "简体中文"
    weight = 1

[params]
  author = "Qinning Xu · 许沁宁"
  description = "Embodied AI research notes by Qinning Xu."
  defaultTheme = "light"
  disableThemeToggle = true
  mainSections = ["posts"]
  ShowToc = true
  TocOpen = true
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true

[params.homeInfoParams]
  Title = "Research Blog"
  Content = "围绕具身智能的论文阅读、研究判断与公开写作。"

  [params.assets]
    favicon = "favicon.svg"
    favicon16x16 = "favicon-16x16.png"
    favicon32x32 = "favicon-32x32.png"
    apple_touch_icon = "apple-touch-icon.png"
    safari_pinned_tab = "safari-pinned-tab.svg"
    theme_color = "#f7f5ef"
    msapplication_TileColor = "#f7f5ef"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/axiat"

[menu]
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "Tags"
    url = "/tags/"
    weight = 2

[outputs]
  home = ["HTML", "RSS"]

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false
